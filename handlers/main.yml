---
# handlers/main.yml - Winlogbeat service lifecycle handlers

- name: restart winlogbeat
  ansible.windows.win_service:
    name: '{{ winlogbeat_service_name }}'
    state: restarted
  when:
    - not ansible_check_mode
    - ansible_os_family == 'Windows'

- name: stop winlogbeat
  ansible.windows.win_service:
    name: '{{ winlogbeat_service_name }}'
    state: stopped
  when:
    - not ansible_check_mode
    - ansible_os_family == 'Windows'
...
