---
- name: Ensure Fluent Bit storage directory exists
  ansible.builtin.file:
    path: "{{ log_forwarder_storage_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: log_forwarder_linux_install | bool

- name: Ensure optional security log directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /var/log/nginx
    - /var/log/apache2
    - /var/log/httpd
  when:
    - log_forwarder_linux_install | bool
    - log_forwarder_security_files_enabled | bool

- name: Ensure Fluent Bit config directory exists
  ansible.builtin.file:
    path: /etc/fluent-bit
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: log_forwarder_linux_install | bool

- name: Deploy Fluent Bit parser configuration
  ansible.builtin.template:
    src: parsers-logbeat-forwarder.conf.j2
    dest: /etc/fluent-bit/parsers-logbeat-forwarder.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart fluent-bit
  when: log_forwarder_linux_install | bool

- name: Deploy Fluent Bit configuration
  ansible.builtin.template:
    src: fluent-bit-logbeat.conf.j2
    dest: /etc/fluent-bit/fluent-bit.conf
    owner: root
    group: root
    mode: '0644'
  notify: restart fluent-bit
  when: log_forwarder_linux_install | bool

- name: Remove legacy journal_forwarder audit package rules file
  ansible.builtin.file:
    path: /etc/audit/rules.d/package.rules
    state: absent
  notify: reload audit rules
  when:
    - log_forwarder_linux_install | bool
    - log_forwarder_audit_enabled | bool

- name: Deploy audit package-change rules
  ansible.builtin.template:
    src: audit-package.rules.j2
    dest: "{{ log_forwarder_audit_rules_file }}"
    owner: root
    group: root
    mode: '0640'
  notify: reload audit rules
  when:
    - log_forwarder_linux_install | bool
    - log_forwarder_audit_enabled | bool
...
