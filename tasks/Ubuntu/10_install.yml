---
- name: Remove obsolete Fluent Bit deb822 repository
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/fluent-bit.sources
    state: absent
  when: log_forwarder_linux_install | bool

- name: Install Ubuntu repository helper packages for Fluent Bit
  ansible.builtin.apt:
    name: "{{ pkg_debian_repository_dependencies }}"
    state: present
    update_cache: true
  when: log_forwarder_linux_install | bool

- name: Install Fluent Bit server GPG key on Ubuntu
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://packages.fluentbit.io/fluentbit.key | gpg --dearmor > /usr/share/keyrings/fluentbit-keyring.gpg.tmp
    if ! cmp -s /usr/share/keyrings/fluentbit-keyring.gpg.tmp /usr/share/keyrings/fluentbit-keyring.gpg 2>/dev/null; then
      mv /usr/share/keyrings/fluentbit-keyring.gpg.tmp /usr/share/keyrings/fluentbit-keyring.gpg
      chmod 0644 /usr/share/keyrings/fluentbit-keyring.gpg
      echo changed
    else
      rm -f /usr/share/keyrings/fluentbit-keyring.gpg.tmp
    fi
  args:
    executable: /bin/bash
  register: log_forwarder_fluent_bit_key
  changed_when: "'changed' in log_forwarder_fluent_bit_key.stdout"
  when: log_forwarder_linux_install | bool

- name: Configure Fluent Bit apt source list on Ubuntu
  ansible.builtin.shell: |
    set -euo pipefail
    codename=$(grep -oP '(?<=VERSION_CODENAME=).*' /etc/os-release 2>/dev/null || lsb_release -cs 2>/dev/null)
    expected="deb [signed-by=/usr/share/keyrings/fluentbit-keyring.gpg] https://packages.fluentbit.io/ubuntu/${codename} ${codename} main"
    dest=/etc/apt/sources.list.d/fluent-bit.list
    if [ ! -f "$dest" ] || [ "$(cat "$dest")" != "$expected" ]; then
      printf '%s\n' "$expected" > "$dest"
      chmod 0644 "$dest"
      echo changed
    fi
  args:
    executable: /bin/bash
  register: log_forwarder_fluent_bit_list
  changed_when: "'changed' in log_forwarder_fluent_bit_list.stdout"
  when: log_forwarder_linux_install | bool

- name: Update apt cache after Fluent Bit repository setup
  ansible.builtin.apt:
    update_cache: true
  changed_when: false
  when:
    - log_forwarder_linux_install | bool
    - log_forwarder_fluent_bit_key is changed or log_forwarder_fluent_bit_list is changed

- name: Install Fluent Bit on Ubuntu
  ansible.builtin.apt:
    name: "{{ pkg_debian_fluent_bit }}"
    state: present
  notify: restart fluent-bit
  when: log_forwarder_linux_install | bool

- name: Install audit packages on Ubuntu
  ansible.builtin.apt:
    name: "{{ pkg_debian_log_forwarder_audit }}"
    state: present
  when:
    - log_forwarder_linux_install | bool
    - log_forwarder_audit_enabled | bool
...
